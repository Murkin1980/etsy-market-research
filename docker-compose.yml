services:
  etsy-research:
    build: .
    container_name: etsy-research
    restart: unless-stopped
    init: true
    read_only: true
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    tmpfs:
      - /tmp:size=512m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    stop_grace_period: 30s
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SERVER_HOST=0.0.0.0
