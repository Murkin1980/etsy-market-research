services:
  etsy-research:
    build: .
    container_name: etsy-research
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:3000:3000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - PORT=3000
